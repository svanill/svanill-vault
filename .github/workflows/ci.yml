name: Continuous integration

on:
  pull_request:
    branches-ignore:
      - release
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-test:
    name: build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2.9.1

      - run: cargo fmt --all -- --check

      - run: cargo check

      - run: cargo clippy --all-targets --all-features --workspace --bins --examples --tests --benches -- -D warnings

      - run: cargo test

      - name: cargo build
        run: cargo build

      - name: Check that we didn't introduce native ssl
        run: "! ldd ../target/debug/svanill-vault-cli | grep -q libssl"

      - run: cargo test --workspace --bins --examples --tests --benches

  dependabot:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.4.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Enable auto-merge for Dependabot PRs
        if: ${{steps.metadata.outputs.update-type != 'version-update:semver-major'}}
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
